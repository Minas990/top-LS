AWSTemplateFormatVersion: '2010-09-09'
Description: >
  github-stats: EC2 (public subnet) + ALB + S3 cache, free-tier scoped.
  NAT Gateway is parameterized and OFF by default. No DynamoDB/CloudFront/Route53
  in this template (out of scope per current deployment phase).

Parameters:
  ProjectName:
    Type: String
    Default: github-stats

  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues: [t3.micro, t2.micro]
    Description: Free-tier eligible types only.

  GitHubToken:
    Type: String
    Default: ''
    NoEcho: true
    Description: Optional GitHub PAT for 5000 req/hr instead of 60. Leave blank to run unauthenticated.

  EnableNatGateway:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: >
      Costs ~$0.045/hr + data processing the instant it's true, no free tier.
      Leave false unless you're actively running a timed private-subnet test.

  AppCodeBucket:
    Type: String
    Description: >
      S3 bucket name where app/*.js has already been uploaded (see deploy.sh).
      Must exist before this stack is created.

  AppCodePrefix:
    Type: String
    Default: app/
    Description: S3 key prefix under AppCodeBucket where the app source lives.

Conditions:
  CreateNatGateway: !Equals [!Ref EnableNatGateway, 'true']

Resources:

  # ---------- Networking ----------

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-vpc'

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-igw'

  IGWAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.0.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-public-a'

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-public-b'

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-public-rt'

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: IGWAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetARouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetBRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable

  S3GatewayEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.s3'
      RouteTableIds:
        - !Ref PublicRouteTable
      VpcEndpointType: Gateway

  # ---------- NAT Gateway (conditional, off by default) ----------

  NatEIP:
    Type: AWS::EC2::EIP
    Condition: CreateNatGateway
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-nat-eip'

  NatGateway:
    Type: AWS::EC2::NatGateway
    Condition: CreateNatGateway
    Properties:
      AllocationId: !GetAtt NatEIP.AllocationId
      SubnetId: !Ref PublicSubnetA
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-nat'

  # ---------- S3 ----------

  CardsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${ProjectName}-cards-${AWS::AccountId}-${AWS::Region}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: expire-cards-after-1-day
            Status: Enabled
            Prefix: cards/
            ExpirationInDays: 1

  # ---------- IAM ----------

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-ec2-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub '${ProjectName}-ec2-policy'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: S3CardCache
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub '${CardsBucket.Arn}/cards/*'
              - Sid: S3AppCodeRead
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${AppCodeBucket}'
                  - !Sub 'arn:aws:s3:::${AppCodeBucket}/${AppCodePrefix}*'

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub '${ProjectName}-ec2-profile'
      Roles:
        - !Ref EC2Role

  # ---------- Security groups ----------

  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow inbound HTTP from the internet
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-alb-sg'

  Ec2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow app port from the ALB only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          SourceSecurityGroupId: !Ref AlbSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-ec2-sg'

  # ---------- EC2 ----------

  AppInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      # Always resolves to the latest Amazon Linux 2023 x86_64 AMI for the region.
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
      SubnetId: !Ref PublicSubnetA
      SecurityGroupIds:
        - !Ref Ec2SecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-app'
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          dnf update -y
          dnf install -y nodejs npm
          mkdir -p /opt/app
          aws s3 cp "s3://${AppCodeBucket}/${AppCodePrefix}" /opt/app/ --recursive --region "${AWS::Region}"
          cd /opt/app
          npm install --omit=dev --no-audit --no-fund

          cat > /etc/systemd/system/github-stats.service <<UNIT_EOF
          [Unit]
          Description=github-stats app
          After=network.target

          [Service]
          Environment=PORT=8080
          Environment=AWS_REGION=${AWS::Region}
          Environment=S3_BUCKET=${CardsBucket}
          Environment=GITHUB_TOKEN=${GitHubToken}
          WorkingDirectory=/opt/app
          ExecStart=/usr/bin/node /opt/app/server.js
          Restart=always
          RestartSec=3
          User=ec2-user

          [Install]
          WantedBy=multi-user.target
          UNIT_EOF

          systemctl daemon-reload
          systemctl enable github-stats
          systemctl start github-stats

  # ---------- ALB ----------

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub '${ProjectName}-alb'
      Type: application
      Scheme: internet-facing
      SecurityGroups:
        - !Ref AlbSecurityGroup
      Subnets:
        - !Ref PublicSubnetA
        - !Ref PublicSubnetB

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${ProjectName}-tg'
      Port: 8080
      Protocol: HTTP
      VpcId: !Ref VPC
      TargetType: instance
      HealthCheckPath: /healthz
      HealthCheckIntervalSeconds: 15
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Targets:
        - Id: !Ref AppInstance
          Port: 8080

  Listener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

Outputs:
  AlbDnsName:
    Description: Hit this with /stats?username=<github-user>
    Value: !GetAtt ApplicationLoadBalancer.DNSName

  CardsBucketName:
    Value: !Ref CardsBucket

  NatGatewayId:
    Condition: CreateNatGateway
    Value: !Ref NatGateway

  NatEipAddress:
    Condition: CreateNatGateway
    Value: !Ref NatEIP
